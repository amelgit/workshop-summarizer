<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Workshop Summarizer · GetYourCFO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8530A;
      --orange-dim: rgba(232, 83, 10, 0.15);
      --orange-border: rgba(232, 83, 10, 0.35);
      --bg: #0A0A0A;
      --surface: #111111;
      --surface-2: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #F0F0F0;
      --text-muted: #888;
      --text-dim: #555;
      --radius: 6px;
    }

    html { font-size: 15px; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
      position: sticky; top: 0;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
      z-index: 10;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 28px; height: 28px; background: var(--orange); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; }
    .header-title { font-size: 0.9rem; font-weight: 600; }
    .header-sub { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .header-nav { display: flex; gap: 16px; align-items: center; }
    .nav-link { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .nav-link:hover { color: var(--text); }
    .header-badge { font-size: 0.7rem; color: var(--orange); border: 1px solid var(--orange-border); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }

    /* ── Layout ── */
    .main { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Login overlay ── */
    #login-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; align-items: center; justify-content: center; }
    #login-overlay.visible { display: flex; }
    .login-box { width: 100%; max-width: 380px; padding: 40px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-align: center; }
    .login-logo { width: 40px; height: 40px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; margin: 0 auto 20px; }
    .login-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
    .login-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 28px; }
    .login-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 0.9rem; padding: 12px 14px; outline: none; text-align: center; letter-spacing: 0.05em; margin-bottom: 14px; transition: border-color 0.15s; }
    .login-input:focus { border-color: var(--orange-border); }
    .login-error { font-size: 0.78rem; color: #ff7070; margin-bottom: 12px; min-height: 1.2em; }

    /* ── Buttons ── */
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--orange); color: #fff; border: none; border-radius: var(--radius); padding: 10px 22px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 14px; font-family: inherit; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── Section label ── */
    .section-label { font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }

    /* ── Summary list ── */
    .summary-count { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; }

    .summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .summary-item:hover { border-color: rgba(255,255,255,0.12); }

    .summary-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      gap: 16px;
    }
    .summary-header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .summary-date { font-size: 0.72rem; color: var(--orange); white-space: nowrap; font-weight: 600; letter-spacing: 0.04em; }
    .summary-title { font-size: 0.88rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-chevron { color: var(--text-dim); font-size: 0.8rem; transition: transform 0.2s; flex-shrink: 0; }
    .summary-item.open .summary-chevron { transform: rotate(180deg); }

    .summary-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Expanded content ── */
    .summary-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
    .summary-item.open .summary-body { display: block; }

    .result-section { margin-top: 16px; }
    .result-section-title { font-size: 0.68rem; font-weight: 700; color: var(--orange); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .result-section-title::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--orange); border-radius: 2px; }
    .result-text { font-size: 0.875rem; color: var(--text); line-height: 1.7; }

    .result-list { list-style: none; }
    .result-list li { font-size: 0.85rem; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }
    .result-list li:last-child { border-bottom: none; }
    .result-list li::before { content: '→'; color: var(--orange); font-size: 0.78rem; margin-top: 2px; flex-shrink: 0; }

    .action-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .action-item:last-child { margin-bottom: 0; }
    .action-task { font-size: 0.85rem; color: var(--text); margin-bottom: 6px; }
    .action-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .action-badge { font-size: 0.7rem; padding: 2px 9px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
    .action-badge.owner { color: var(--text-muted); background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .action-badge.deadline { color: var(--orange); background: var(--orange-dim); border: 1px solid var(--orange-border); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 80px 24px; color: var(--text-dim); }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-state-text { font-size: 0.9rem; }

    /* ── Loading ── */
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PDF template ── */
    #pdf-template { display: none; font-family: 'Space Grotesk', sans-serif; color: #1a1a1a; background: #fff; padding: 40px 48px; max-width: 800px; }
    .pdf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid #E8530A; }
    .pdf-logo { display: flex; align-items: center; gap: 10px; }
    .pdf-logo-box { width: 32px; height: 32px; background: #E8530A; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; }
    .pdf-brand { font-size: 14px; font-weight: 700; }
    .pdf-sub { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .pdf-date { font-size: 11px; color: #888; }
    .pdf-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .pdf-section { margin-bottom: 24px; }
    .pdf-section-title { font-size: 9px; font-weight: 700; color: #E8530A; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; }
    .pdf-text { font-size: 11px; color: #333; line-height: 1.7; }
    .pdf-list { list-style: none; }
    .pdf-list li { font-size: 11px; color: #333; padding: 4px 0; display: flex; gap: 8px; }
    .pdf-list li::before { content: '→'; color: #E8530A; flex-shrink: 0; }
    .pdf-action { background: #f9f9f9; border-left: 3px solid #E8530A; padding: 10px 14px; margin-bottom: 8px; border-radius: 0 4px 4px 0; }
    .pdf-action-task { font-size: 11px; color: #1a1a1a; margin-bottom: 5px; }
    .pdf-action-meta { display: flex; gap: 12px; font-size: 10px; color: #888; }
    .pdf-module-title { font-size: 13px; font-weight: 700; color: #E8530A; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; letter-spacing: 0.06em; }
    .pdf-subsection-label { font-size: 9px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin: 10px 0 4px; }
    .pdf-okr { background: #f9f9f9; border-left: 3px solid #E8530A; padding: 10px 12px; margin-bottom: 8px; border-radius: 0 4px 4px 0; }
    .pdf-okr-obj { font-size: 11px; font-weight: 600; color: #E8530A; margin-bottom: 6px; }
    .pdf-okr-kr { font-size: 10px; color: #333; padding: 2px 0 2px 10px; border-left: 1px solid #ddd; margin-bottom: 2px; }
    .pdf-okr-rationale { font-size: 10px; color: #888; font-style: italic; margin-top: 6px; }
    .pdf-gap { background: #f9f9f9; padding: 8px 12px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #eee; }
    .pdf-gap-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .pdf-gap-area { font-size: 11px; font-weight: 600; color: #1a1a1a; }
    .pdf-gap-severity { font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .pdf-gap-desc { font-size: 10px; color: #555; }
    .pdf-footer { margin-top: 40px; padding-top: 12px; border-top: 1px solid #eee; font-size: 9px; color: #bbb; text-align: center; }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">GY</div>
    <div class="login-title">Workshop Summarizer</div>
    <div class="login-sub">by GetYourCFO · Bitte Passwort eingeben</div>
    <input class="login-input" id="login-input" type="password" placeholder="Passwort" autocomplete="current-password" />
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="submitLogin()">Anmelden</button>
  </div>
</div>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">GY</div>
    <div>
      <div class="header-title">Workshop Summarizer</div>
      <div class="header-sub">by GetYourCFO</div>
    </div>
  </div>
  <div class="header-nav">
    <a href="/" class="nav-link">← Zurück zur App</a>
    <div class="header-badge">Admin</div>
  </div>
</header>

<main class="main">
  <div class="section-label">[ Gespeicherte Zusammenfassungen ]</div>
  <div id="summary-list"><div class="spinner"></div></div>
</main>

<div id="pdf-template"></div>

<script>
  // ── Auth ────────────────────────────────────────────────────────────────────
  let adminToken = sessionStorage.getItem('admin_token');

  async function initAuth() {
    const res = await fetch('/api/admin/summaries', {
      headers: adminToken ? { 'x-admin-token': adminToken } : {},
    });
    if (res.status === 401) {
      sessionStorage.removeItem('admin_token');
      adminToken = null;
      document.getElementById('login-overlay').classList.add('visible');
    } else {
      const data = await res.json();
      renderList(data);
    }
  }

  async function submitLogin() {
    const password = document.getElementById('login-input').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!password) { errEl.textContent = 'Bitte Passwort eingeben'; return; }

    const res = await fetch('/api/admin/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Falsches Passwort'; return; }

    adminToken = data.token;
    if (adminToken) sessionStorage.setItem('admin_token', adminToken);
    document.getElementById('login-overlay').classList.remove('visible');
    loadSummaries();
  }

  document.getElementById('login-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitLogin();
  });

  function authHeaders() {
    return adminToken ? { 'x-admin-token': adminToken } : {};
  }

  // ── List ────────────────────────────────────────────────────────────────────
  async function loadSummaries() {
    const res = await fetch('/api/admin/summaries', { headers: authHeaders() });
    const data = await res.json();
    renderList(data);
  }

  function renderList(items) {
    const container = document.getElementById('summary-list');
    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">◻</div>
          <div class="empty-state-text">Noch keine Zusammenfassungen gespeichert.</div>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="summary-count">${items.length} Zusammenfassung${items.length !== 1 ? 'en' : ''}</div>` +
      items.map(item => `
        <div class="summary-item" id="item-${item.id}">
          <div class="summary-header" onclick="toggleItem('${item.id}', '${item.filename}')">
            <div class="summary-header-left">
              <span class="summary-date">${formatDate(item.timestamp)}</span>
              <span class="summary-title">${escHtml(item.title)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
              <div class="summary-actions" onclick="event.stopPropagation()">
                <button class="btn-secondary" onclick="downloadPdf('${item.filename}')">↓ PDF</button>
              </div>
              <span class="summary-chevron">▾</span>
            </div>
          </div>
          <div class="summary-body" id="body-${item.id}">
            <div style="font-size:0.78rem;color:var(--text-dim);padding-top:16px">Wird geladen…</div>
          </div>
        </div>
      `).join('');
  }

  const loadedItems = {};

  async function toggleItem(id, filename) {
    const el = document.getElementById('item-' + id);
    const body = document.getElementById('body-' + id);
    const isOpen = el.classList.contains('open');

    // Close all others
    document.querySelectorAll('.summary-item.open').forEach(x => x.classList.remove('open'));

    if (isOpen) return;

    el.classList.add('open');

    if (loadedItems[id]) {
      renderSummaryBody(body, loadedItems[id]);
      return;
    }

    const res = await fetch(`/api/admin/summaries/${filename}`, { headers: authHeaders() });
    const record = await res.json();
    loadedItems[id] = record;
    renderSummaryBody(body, record);
  }

  const MODULE_META = {
    workshop_summary:  { icon: '📋', label: 'Workshop Summary' },
    okr_derivation:    { icon: '🎯', label: 'OKRs ableiten' },
    critical_analysis: { icon: '⚠️', label: 'Was machen wir falsch' },
    strategic_gaps:    { icon: '🔍', label: 'Strategische Lücken' },
    team_alignment:    { icon: '🤝', label: 'Team Alignment Check' },
  };

  function renderList(arr) {
    if (!arr?.length) return '<div style="font-size:0.82rem;color:var(--text-dim);font-style:italic">Keine Einträge</div>';
    return `<ul class="result-list">${arr.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>`;
  }

  function renderModuleBlock(moduleId, data) {
    switch (moduleId) {
      case 'workshop_summary': {
        const actions = data.aktionspunkte?.length
          ? data.aktionspunkte.map(a => `
              <div class="action-item">
                <div class="action-task">${escHtml(a.aufgabe)}</div>
                <div class="action-meta">
                  ${a.verantwortlich ? `<span class="action-badge owner">👤 ${escHtml(a.verantwortlich)}</span>` : ''}
                  ${a.frist ? `<span class="action-badge deadline">📅 ${escHtml(a.frist)}</span>` : ''}
                </div>
              </div>`).join('')
          : '<div style="font-size:0.82rem;color:var(--text-dim)">Keine Aktionspunkte</div>';
        return `
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Kontext &amp; Ziel</div><div class="result-text">${escHtml(data.kontext_ziel||'–')}</div></div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Kernentscheidungen</div>${renderList(data.kernentscheidungen)}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Aktionspunkte</div>${actions}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Offene Fragen</div>${renderList(data.offene_fragen)}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">OKR &amp; Strategie-Insights</div>${renderList(data.okr_strategie_insights)}</div>
          <div><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Stimmung</div><div class="result-text">${escHtml(data.stimmung_team||'–')}</div></div>`;
      }
      case 'okr_derivation':
        return (data.objectives||[]).map((obj,i) => `
          <div class="action-item">
            <div style="font-size:0.88rem;font-weight:600;color:var(--orange);margin-bottom:8px">O${i+1}: ${escHtml(obj.objective)}</div>
            ${(obj.key_results||[]).map((kr,j) => `<div style="font-size:0.82rem;color:var(--text);padding:3px 0 3px 12px;border-left:2px solid var(--border)">KR${j+1}: ${escHtml(kr)}</div>`).join('')}
            ${obj.begruendung ? `<div style="font-size:0.78rem;color:var(--text-muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${escHtml(obj.begruendung)}</div>` : ''}
          </div>`).join('') || '<div style="font-size:0.82rem;color:var(--text-dim);font-style:italic">Keine OKRs</div>';
      case 'critical_analysis':
        return `
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Blinde Flecken</div>${renderList(data.blinde_flecken)}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Risiken</div>${renderList(data.risiken)}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Widersprüche</div>${renderList(data.widersprueche)}</div>
          <div><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Empfehlungen</div>${renderList(data.empfehlungen)}</div>`;
      case 'strategic_gaps':
        return `
          ${(data.luecken||[]).map(l => `
            <div class="action-item" style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-size:0.85rem;font-weight:600">${escHtml(l.bereich)}</span>
                <span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:20px;${l.schwere==='hoch'?'color:#ff7070;background:rgba(255,100,100,.12);border:1px solid rgba(255,100,100,.3)':l.schwere==='mittel'?'color:#f0b429;background:rgba(240,180,41,.12);border:1px solid rgba(240,180,41,.3)':'color:#5cb85c;background:rgba(92,184,92,.12);border:1px solid rgba(92,184,92,.3)'}">${escHtml(l.schwere)}</span>
              </div>
              <div style="font-size:0.82rem;color:var(--text-muted)">${escHtml(l.beschreibung)}</div>
            </div>`).join('')}
          <div style="margin-top:12px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Fehlende Elemente</div>${renderList(data.fehlende_elemente)}</div>`;
      case 'team_alignment':
        return `
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Gesamtbewertung</div><div class="result-text">${escHtml(data.alignment_bewertung||'–')}</div></div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Einigkeit bei Themen</div>${renderList(data.einigkeit_themen)}</div>
          <div style="margin-bottom:14px"><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Spannungsfelder</div>${renderList(data.spannungsfelder)}</div>
          <div><div style="font-size:0.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Empfehlung</div><div class="result-text">${escHtml(data.empfehlung||'–')}</div></div>`;
      default: return '';
    }
  }

  function renderSummaryBody(body, record) {
    // Support both new format (results) and old format (summary)
    const results = record.results || (record.summary ? { workshop_summary: record.summary } : {});

    body.innerHTML = Object.entries(results).map(([moduleId, data]) => {
      const meta = MODULE_META[moduleId] || { icon: '•', label: moduleId };
      return `<div style="margin-top:16px">
        <div class="result-section-title">${meta.icon} &nbsp;${meta.label.toUpperCase()}</div>
        ${renderModuleBlock(moduleId, data)}
      </div>`;
    }).join('');
  }

  // ── PDF export ──────────────────────────────────────────────────────────────
  function pdfList(arr) {
    if (!arr?.length) return '<p class="pdf-text" style="color:#999">Keine Einträge</p>';
    return `<ul class="pdf-list">${arr.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>`;
  }

  function pdfModuleSection(moduleId, data) {
    const meta = MODULE_META[moduleId] || { icon: '', label: moduleId };
    let content = '';
    switch (moduleId) {
      case 'workshop_summary':
        content = `
          <div class="pdf-subsection-label">Kontext &amp; Ziel</div><p class="pdf-text">${escHtml(data.kontext_ziel||'–')}</p>
          <div class="pdf-subsection-label">Kernentscheidungen</div>${pdfList(data.kernentscheidungen)}
          <div class="pdf-subsection-label">Aktionspunkte</div>
          ${(data.aktionspunkte||[]).map(a => `<div class="pdf-action"><div class="pdf-action-task">${escHtml(a.aufgabe)}</div><div class="pdf-action-meta">${a.verantwortlich?`<span>👤 ${escHtml(a.verantwortlich)}</span>`:''} ${a.frist?`<span>📅 ${escHtml(a.frist)}</span>`:''}</div></div>`).join('')||'<p class="pdf-text" style="color:#999">Keine</p>'}
          <div class="pdf-subsection-label">Offene Fragen</div>${pdfList(data.offene_fragen)}
          <div class="pdf-subsection-label">OKR-Insights</div>${pdfList(data.okr_strategie_insights)}
          <div class="pdf-subsection-label">Stimmung</div><p class="pdf-text">${escHtml(data.stimmung_team||'–')}</p>`;
        break;
      case 'okr_derivation':
        content = (data.objectives||[]).map((obj,i) => `<div class="pdf-okr"><div class="pdf-okr-obj">O${i+1}: ${escHtml(obj.objective)}</div>${(obj.key_results||[]).map((kr,j)=>`<div class="pdf-okr-kr">KR${j+1}: ${escHtml(kr)}</div>`).join('')}${obj.begruendung?`<div class="pdf-okr-rationale">${escHtml(obj.begruendung)}</div>`:''}</div>`).join('')||'<p class="pdf-text" style="color:#999">Keine OKRs</p>';
        break;
      case 'critical_analysis':
        content = `<div class="pdf-subsection-label">Blinde Flecken</div>${pdfList(data.blinde_flecken)}<div class="pdf-subsection-label">Risiken</div>${pdfList(data.risiken)}<div class="pdf-subsection-label">Widersprüche</div>${pdfList(data.widersprueche)}<div class="pdf-subsection-label">Empfehlungen</div>${pdfList(data.empfehlungen)}`;
        break;
      case 'strategic_gaps':
        content = (data.luecken||[]).map(l=>`<div class="pdf-gap"><div class="pdf-gap-header"><span class="pdf-gap-area">${escHtml(l.bereich)}</span><span class="pdf-gap-severity">${escHtml(l.schwere)}</span></div><div class="pdf-gap-desc">${escHtml(l.beschreibung)}</div></div>`).join('')+`<div class="pdf-subsection-label">Fehlende Elemente</div>${pdfList(data.fehlende_elemente)}`;
        break;
      case 'team_alignment':
        content = `<p class="pdf-text">${escHtml(data.alignment_bewertung||'–')}</p><div class="pdf-subsection-label">Einigkeit</div>${pdfList(data.einigkeit_themen)}<div class="pdf-subsection-label">Spannungsfelder</div>${pdfList(data.spannungsfelder)}<div class="pdf-subsection-label">Empfehlung</div><p class="pdf-text">${escHtml(data.empfehlung||'–')}</p>`;
        break;
    }
    return `<div class="pdf-module-title">${meta.icon} ${meta.label}</div>${content}`;
  }

  async function downloadPdf(filename) {
    let record = Object.values(loadedItems).find(r => r.id && filename.startsWith(r.id));
    if (!record) {
      const res = await fetch(`/api/admin/summaries/${filename}`, { headers: authHeaders() });
      record = await res.json();
    }

    const results = record.results || (record.summary ? { workshop_summary: record.summary } : {});
    const dateStr = formatDate(record.timestamp);

    const tmpl = document.getElementById('pdf-template');
    tmpl.innerHTML = `
      <div class="pdf-header">
        <div class="pdf-logo">
          <div class="pdf-logo-box">GY</div>
          <div><div class="pdf-brand">GetYourCFO</div><div class="pdf-sub">Workshop Summarizer</div></div>
        </div>
        <div class="pdf-date">Erstellt: ${dateStr}</div>
      </div>
      ${Object.entries(results).map(([id, data]) => pdfModuleSection(id, data)).join('')}
      <div class="pdf-footer">Vertraulich · Workshop Summarizer by GetYourCFO · ${dateStr}</div>`;

    tmpl.style.display = 'block';
    html2pdf().set({
      margin: 0,
      filename: `workshop-${dateStr.replace(/\./g,'-')}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    }).from(tmpl).save().then(() => { tmpl.style.display = 'none'; });
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function formatDate(iso) {
    return new Date(iso).toLocaleString('de-DE', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  initAuth();
</script>
</body>
</html>
