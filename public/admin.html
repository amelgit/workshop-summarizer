<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Workshop Summarizer · GetYourCFO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8530A;
      --orange-dim: rgba(232, 83, 10, 0.15);
      --orange-border: rgba(232, 83, 10, 0.35);
      --bg: #0A0A0A;
      --surface: #111111;
      --surface-2: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #F0F0F0;
      --text-muted: #888;
      --text-dim: #555;
      --radius: 6px;
    }

    html { font-size: 15px; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
      position: sticky; top: 0;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
      z-index: 10;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 28px; height: 28px; background: var(--orange); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; }
    .header-title { font-size: 0.9rem; font-weight: 600; }
    .header-sub { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .header-nav { display: flex; gap: 16px; align-items: center; }
    .nav-link { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .nav-link:hover { color: var(--text); }
    .header-badge { font-size: 0.7rem; color: var(--orange); border: 1px solid var(--orange-border); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }

    /* ── Layout ── */
    .main { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Login overlay ── */
    #login-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; align-items: center; justify-content: center; }
    #login-overlay.visible { display: flex; }
    .login-box { width: 100%; max-width: 380px; padding: 40px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-align: center; }
    .login-logo { width: 40px; height: 40px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; margin: 0 auto 20px; }
    .login-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
    .login-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 28px; }
    .login-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 0.9rem; padding: 12px 14px; outline: none; text-align: center; letter-spacing: 0.05em; margin-bottom: 14px; transition: border-color 0.15s; }
    .login-input:focus { border-color: var(--orange-border); }
    .login-error { font-size: 0.78rem; color: #ff7070; margin-bottom: 12px; min-height: 1.2em; }

    /* ── Buttons ── */
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--orange); color: #fff; border: none; border-radius: var(--radius); padding: 10px 22px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 14px; font-family: inherit; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── Section label ── */
    .section-label { font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }

    /* ── Summary list ── */
    .summary-count { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; }

    .summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .summary-item:hover { border-color: rgba(255,255,255,0.12); }

    .summary-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      gap: 16px;
    }
    .summary-header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .summary-date { font-size: 0.72rem; color: var(--orange); white-space: nowrap; font-weight: 600; letter-spacing: 0.04em; }
    .summary-title { font-size: 0.88rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-chevron { color: var(--text-dim); font-size: 0.8rem; transition: transform 0.2s; flex-shrink: 0; }
    .summary-item.open .summary-chevron { transform: rotate(180deg); }

    .summary-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Expanded content ── */
    .summary-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
    .summary-item.open .summary-body { display: block; }

    .result-section { margin-top: 16px; }
    .result-section-title { font-size: 0.68rem; font-weight: 700; color: var(--orange); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .result-section-title::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--orange); border-radius: 2px; }
    .result-text { font-size: 0.875rem; color: var(--text); line-height: 1.7; }

    .result-list { list-style: none; }
    .result-list li { font-size: 0.85rem; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }
    .result-list li:last-child { border-bottom: none; }
    .result-list li::before { content: '→'; color: var(--orange); font-size: 0.78rem; margin-top: 2px; flex-shrink: 0; }

    .action-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .action-item:last-child { margin-bottom: 0; }
    .action-task { font-size: 0.85rem; color: var(--text); margin-bottom: 6px; }
    .action-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .action-badge { font-size: 0.7rem; padding: 2px 9px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
    .action-badge.owner { color: var(--text-muted); background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .action-badge.deadline { color: var(--orange); background: var(--orange-dim); border: 1px solid var(--orange-border); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 80px 24px; color: var(--text-dim); }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-state-text { font-size: 0.9rem; }

    /* ── Loading ── */
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PDF template ── */
    #pdf-template { display: none; font-family: 'Space Grotesk', sans-serif; color: #1a1a1a; background: #fff; padding: 40px 48px; max-width: 800px; }
    .pdf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid #E8530A; }
    .pdf-logo { display: flex; align-items: center; gap: 10px; }
    .pdf-logo-box { width: 32px; height: 32px; background: #E8530A; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; }
    .pdf-brand { font-size: 14px; font-weight: 700; }
    .pdf-sub { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .pdf-date { font-size: 11px; color: #888; }
    .pdf-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .pdf-section { margin-bottom: 24px; }
    .pdf-section-title { font-size: 9px; font-weight: 700; color: #E8530A; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; }
    .pdf-text { font-size: 11px; color: #333; line-height: 1.7; }
    .pdf-list { list-style: none; }
    .pdf-list li { font-size: 11px; color: #333; padding: 4px 0; display: flex; gap: 8px; }
    .pdf-list li::before { content: '→'; color: #E8530A; flex-shrink: 0; }
    .pdf-action { background: #f9f9f9; border-left: 3px solid #E8530A; padding: 10px 14px; margin-bottom: 8px; border-radius: 0 4px 4px 0; }
    .pdf-action-task { font-size: 11px; color: #1a1a1a; margin-bottom: 5px; }
    .pdf-action-meta { display: flex; gap: 12px; font-size: 10px; color: #888; }
    .pdf-footer { margin-top: 40px; padding-top: 12px; border-top: 1px solid #eee; font-size: 9px; color: #bbb; text-align: center; }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">GY</div>
    <div class="login-title">Workshop Summarizer</div>
    <div class="login-sub">by GetYourCFO · Bitte Passwort eingeben</div>
    <input class="login-input" id="login-input" type="password" placeholder="Passwort" autocomplete="current-password" />
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="submitLogin()">Anmelden</button>
  </div>
</div>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">GY</div>
    <div>
      <div class="header-title">Workshop Summarizer</div>
      <div class="header-sub">by GetYourCFO</div>
    </div>
  </div>
  <div class="header-nav">
    <a href="/" class="nav-link">← Zurück zur App</a>
    <div class="header-badge">Admin</div>
  </div>
</header>

<main class="main">
  <div class="section-label">[ Gespeicherte Zusammenfassungen ]</div>
  <div id="summary-list"><div class="spinner"></div></div>
</main>

<div id="pdf-template"></div>

<script>
  // ── Auth ────────────────────────────────────────────────────────────────────
  let appToken = sessionStorage.getItem('app_token');

  async function initAuth() {
    const res = await fetch('/api/admin/summaries', {
      headers: appToken ? { 'x-app-token': appToken } : {},
    });
    if (res.status === 401) {
      sessionStorage.removeItem('app_token');
      appToken = null;
      document.getElementById('login-overlay').classList.add('visible');
    } else {
      const data = await res.json();
      renderList(data);
    }
  }

  async function submitLogin() {
    const password = document.getElementById('login-input').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!password) { errEl.textContent = 'Bitte Passwort eingeben'; return; }

    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Falsches Passwort'; return; }

    appToken = data.token;
    if (appToken) sessionStorage.setItem('app_token', appToken);
    document.getElementById('login-overlay').classList.remove('visible');
    loadSummaries();
  }

  document.getElementById('login-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitLogin();
  });

  function authHeaders() {
    return appToken ? { 'x-app-token': appToken } : {};
  }

  // ── List ────────────────────────────────────────────────────────────────────
  async function loadSummaries() {
    const res = await fetch('/api/admin/summaries', { headers: authHeaders() });
    const data = await res.json();
    renderList(data);
  }

  function renderList(items) {
    const container = document.getElementById('summary-list');
    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">◻</div>
          <div class="empty-state-text">Noch keine Zusammenfassungen gespeichert.</div>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="summary-count">${items.length} Zusammenfassung${items.length !== 1 ? 'en' : ''}</div>` +
      items.map(item => `
        <div class="summary-item" id="item-${item.id}">
          <div class="summary-header" onclick="toggleItem('${item.id}', '${item.filename}')">
            <div class="summary-header-left">
              <span class="summary-date">${formatDate(item.timestamp)}</span>
              <span class="summary-title">${escHtml(item.title)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
              <div class="summary-actions" onclick="event.stopPropagation()">
                <button class="btn-secondary" onclick="downloadPdf('${item.filename}')">↓ PDF</button>
              </div>
              <span class="summary-chevron">▾</span>
            </div>
          </div>
          <div class="summary-body" id="body-${item.id}">
            <div style="font-size:0.78rem;color:var(--text-dim);padding-top:16px">Wird geladen…</div>
          </div>
        </div>
      `).join('');
  }

  const loadedItems = {};

  async function toggleItem(id, filename) {
    const el = document.getElementById('item-' + id);
    const body = document.getElementById('body-' + id);
    const isOpen = el.classList.contains('open');

    // Close all others
    document.querySelectorAll('.summary-item.open').forEach(x => x.classList.remove('open'));

    if (isOpen) return;

    el.classList.add('open');

    if (loadedItems[id]) {
      renderSummaryBody(body, loadedItems[id]);
      return;
    }

    const res = await fetch(`/api/admin/summaries/${filename}`, { headers: authHeaders() });
    const record = await res.json();
    loadedItems[id] = record;
    renderSummaryBody(body, record);
  }

  function renderSummaryBody(body, record) {
    const s = record.summary;
    const actionsHtml = (s.aktionspunkte || []).length === 0
      ? '<div style="font-size:0.82rem;color:var(--text-dim)">Keine Aktionspunkte</div>'
      : (s.aktionspunkte || []).map(a => `
          <div class="action-item">
            <div class="action-task">${escHtml(a.aufgabe)}</div>
            <div class="action-meta">
              ${a.verantwortlich ? `<span class="action-badge owner">👤 ${escHtml(a.verantwortlich)}</span>` : ''}
              ${a.frist ? `<span class="action-badge deadline">📅 ${escHtml(a.frist)}</span>` : ''}
            </div>
          </div>`).join('');

    body.innerHTML = `
      <div class="result-section">
        <div class="result-section-title">Kontext &amp; Ziel</div>
        <div class="result-text">${escHtml(s.kontext_ziel || '–')}</div>
      </div>
      <div class="result-section">
        <div class="result-section-title">Kernentscheidungen</div>
        <ul class="result-list">${(s.kernentscheidungen || []).map(e => `<li>${escHtml(e)}</li>`).join('') || '<li>–</li>'}</ul>
      </div>
      <div class="result-section">
        <div class="result-section-title">Aktionspunkte</div>
        ${actionsHtml}
      </div>
      <div class="result-section">
        <div class="result-section-title">Offene Fragen</div>
        <ul class="result-list">${(s.offene_fragen || []).map(f => `<li>${escHtml(f)}</li>`).join('') || '<li>–</li>'}</ul>
      </div>
      <div class="result-section">
        <div class="result-section-title">OKR &amp; Strategie-Insights</div>
        <ul class="result-list">${(s.okr_strategie_insights || []).map(i => `<li>${escHtml(i)}</li>`).join('') || '<li>–</li>'}</ul>
      </div>
      <div class="result-section">
        <div class="result-section-title">Stimmung &amp; Team-Alignment</div>
        <div class="result-text">${escHtml(s.stimmung_team || '–')}</div>
      </div>`;
  }

  // ── PDF export ──────────────────────────────────────────────────────────────
  async function downloadPdf(filename) {
    let record = Object.values(loadedItems).find(r => r.id && filename.startsWith(r.id));
    if (!record) {
      const res = await fetch(`/api/admin/summaries/${filename}`, { headers: authHeaders() });
      record = await res.json();
    }

    const s = record.summary;
    const dateStr = formatDate(record.timestamp);

    const actionsHtml = (s.aktionspunkte || []).map(a => `
      <div class="pdf-action">
        <div class="pdf-action-task">${escHtml(a.aufgabe)}</div>
        <div class="pdf-action-meta">
          ${a.verantwortlich ? `<span>👤 ${escHtml(a.verantwortlich)}</span>` : ''}
          ${a.frist ? `<span>📅 ${escHtml(a.frist)}</span>` : ''}
        </div>
      </div>`).join('') || '<p class="pdf-text" style="color:#999">Keine Aktionspunkte</p>';

    const listHtml = (arr, fallback) =>
      arr && arr.length
        ? `<ul class="pdf-list">${arr.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>`
        : `<p class="pdf-text" style="color:#999">${fallback}</p>`;

    const tmpl = document.getElementById('pdf-template');
    tmpl.innerHTML = `
      <div class="pdf-header">
        <div class="pdf-logo">
          <div class="pdf-logo-box">GY</div>
          <div><div class="pdf-brand">GetYourCFO</div><div class="pdf-sub">Workshop Summarizer</div></div>
        </div>
        <div class="pdf-date">Erstellt: ${dateStr}</div>
      </div>
      <div class="pdf-title">Workshop-Zusammenfassung</div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 01 · Kontext &amp; Ziel ]</div>
        <p class="pdf-text">${escHtml(s.kontext_ziel || '–')}</p>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 02 · Kernentscheidungen ]</div>
        ${listHtml(s.kernentscheidungen, 'Keine Kernentscheidungen')}
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 03 · Aktionspunkte ]</div>
        ${actionsHtml}
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 04 · Offene Fragen ]</div>
        ${listHtml(s.offene_fragen, 'Keine offenen Fragen')}
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 05 · OKR &amp; Strategie-Insights ]</div>
        ${listHtml(s.okr_strategie_insights, 'Keine OKR-Relevanz')}
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">[ 06 · Stimmung &amp; Team-Alignment ]</div>
        <p class="pdf-text">${escHtml(s.stimmung_team || '–')}</p>
      </div>
      <div class="pdf-footer">Vertraulich · Workshop Summarizer by GetYourCFO · ${dateStr}</div>`;

    tmpl.style.display = 'block';
    const safeDate = dateStr.replace(/\./g, '-');
    html2pdf().set({
      margin: 0,
      filename: `workshop-${safeDate}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    }).from(tmpl).save().then(() => { tmpl.style.display = 'none'; });
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function formatDate(iso) {
    return new Date(iso).toLocaleString('de-DE', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  initAuth();
</script>
</body>
</html>
